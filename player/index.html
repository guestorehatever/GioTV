<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GioTV Player</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --border: #1f1f1f;
      --accent: #e8e8e8;
      --muted: #444;
      --live: #ff3b3b;
      --bar-h: 52px;
      --schedule-bg: #0c0c0c;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── OUTER SHELL ── */
    .shell {
      width: 100%; height: 100%;
      display: flex;
    }

    /* PORTRAIT: player top, schedule bottom */
    @media (orientation: portrait) {
      .shell { flex-direction: column; }
      .player-wrap {
        width: 100%;
        aspect-ratio: 16 / 9;
        flex-shrink: 0;
      }
      .schedule-wrap {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
    }

    /* LANDSCAPE: player left, schedule right */
    @media (orientation: landscape) {
      .shell { flex-direction: row; }
      .player-wrap {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      .schedule-wrap {
        width: 300px;
        flex-shrink: 0;
        overflow-y: auto;
        border-left: 1px solid var(--border);
        border-right: none;
      }
    }

    /* ── PLAYER ── */
    /* Portrait: player-wrap IS the 16:9 box */
    @media (orientation: portrait) {
      .player {
        width: 100%; height: 100%;
        position: relative;
        background: #000;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
    }

    /* Landscape: player sizes itself to fit the remaining space at 16:9 */
    @media (orientation: landscape) {
      .player {
        width: 100%;
        max-height: 100%;
        aspect-ratio: 16 / 9;
        max-width: calc(100vh * 16 / 9);
        position: relative;
        background: #000;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
    }

    .video-wrap {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
      min-height: 0;
    }

    video {
      width: 100%; height: 100%;
      display: block;
      object-fit: contain;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 40%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .center-flash {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 10;
    }
    .center-flash.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .center-flash svg { width: 26px; height: 26px; fill: #fff; }

    .spinner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      z-index: 10;
      display: none;
    }
    .spinner.show { display: block; }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── OFFLINE SCREEN ── */
    .offline-screen {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
    }
    .offline-screen.show { display: block; }
    .offline-screen img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── CONTROLS ── */
    .controls-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      transition: opacity 0.35s, transform 0.35s;
      z-index: 20;
    }
    .controls-wrap.hidden {
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
    }

    .controls {
      height: var(--bar-h);
      background: rgba(10,10,10,0.97);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      color: #888;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .btn:hover { color: #ddd; background: rgba(255,255,255,0.05); }
    .btn svg { width: 16px; height: 16px; }
    .btn.active { color: #fff; }

    .vol-group { display: flex; align-items: center; gap: 4px; }
    .spacer { flex: 1; }

    /* FULLSCREEN STYLES */
    .player:fullscreen,
    .player:-webkit-full-screen,
    .player:-moz-full-screen,
    .player:-ms-fullscreen {
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      aspect-ratio: auto !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      z-index: 999999 !important;
    }

    .player:fullscreen .video-wrap,
    .player:-webkit-full-screen .video-wrap,
    .player:-moz-full-screen .video-wrap,
    .player:-ms-fullscreen .video-wrap {
      width: 100% !important;
      height: 100% !important;
    }

    /* AirPlay button — shown only on Safari */
    #airplayBtn { display: none; }

    /* Chromecast — hide until API ready */
    #castBtn { display: none; }
    #castBtn.ready { display: flex; }

    /* ── SCHEDULE ── */
    .schedule-wrap {
      background: var(--schedule-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    @media (orientation: portrait) {
      .schedule-wrap {
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }

    .schedule-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--schedule-bg);
      z-index: 1;
      flex-shrink: 0;
    }

    .schedule-tab {
      flex: 1;
      padding: 12px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #444;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .schedule-tab:hover { color: #888; }
    .schedule-tab.active {
      color: #ccc;
      border-bottom: 2px solid #ccc;
      margin-bottom: -1px;
    }

    .schedule-close {
      margin-left: auto;
      padding: 0 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: #333;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .schedule-close:hover { color: #888; }
    .schedule-close svg { width: 14px; height: 14px; }

    .schedule-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    .schedule-item {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #151515;
      transition: background 0.15s;
    }
    .schedule-item:hover { background: rgba(255,255,255,0.03); }
    .schedule-item.now { background: rgba(255,255,255,0.04); }
    .schedule-item.now .si-time { color: var(--live); }

    .si-time {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.06em;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 52px;
    }

    .si-info { flex: 1; min-width: 0; }

    .si-title {
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .si-desc {
      font-size: 10px;
      color: #444;
      letter-spacing: 0.03em;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .now-pill {
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--live);
      border: 1px solid rgba(255,59,59,0.35);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── PLAYER ── -->
  <div class="player-wrap">
    <div class="player" id="player">
      <div class="video-wrap" id="videoWrap">
        <video id="video" preload="auto" playsinline></video>
        <div class="overlay" id="overlay"></div>
        <div class="center-flash" id="centerFlash">
          <svg id="flashIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="spinner" id="spinner"></div>
        <div class="offline-screen" id="offlineScreen">
          <img src="../offline.png" alt="Channel Offline"/>
        </div>
      </div>

      <div class="controls-wrap" id="controlsWrap">
        <div class="controls" id="controlsBar">
          <button class="btn" id="playBtn" title="Play/Pause">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>

          <div class="vol-group">
            <button class="btn" id="muteBtn" title="Mute">
              <svg id="volIcon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              </svg>
            </button>
          </div>

          <div class="spacer"></div>

          <!-- AirPlay (Safari only) -->
          <button class="btn" id="airplayBtn" title="AirPlay">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 22h12l-6-6-6 6zM21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4v-2H3V5h18v12h-4v2h4c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
            </svg>
          </button>

          <!-- Chromecast -->
          <button class="btn" id="castBtn" title="Cast">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm18-7H5c-1.1 0-2 .9-2 2v3h2v-3h14v10h-5v2h5c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM1 10v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11z"/>
            </svg>
          </button>

          <button class="btn" id="pipBtn" title="Picture-in-Picture">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 7H5c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm0 11H5V9h14v9zm-8-7h6v5h-6z"/>
            </svg>
          </button>

          <button class="btn" id="fsBtn" title="Fullscreen">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SCHEDULE ── -->
  <div class="schedule-wrap" id="scheduleWrap">
    <div class="schedule-tabs">
      <button class="schedule-tab active" id="tabToday">Today</button>
      <button class="schedule-tab" id="tabTomorrow">Tomorrow</button>
      <!-- Close button — wired to close the schedule/modal -->
      <button class="schedule-close" id="scheduleCloseBtn" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <ul class="schedule-list" id="scheduleList"></ul>
  </div>

</div><!-- .shell -->

<script>
  // Channel mapping with IDs
  const CHANNEL_MAP = {
    'fighttv1': { name: 'Fight TV', src: 'https://rpn.bozztv.com/gusa/gusa-fighttvplus/index.m3u8' },
    'geej1': { name: 'Geej', src: 'https://183.bozztv.com/giatv/giatv-giogolive/giogolive/playlist.m3u8' },
    'weatherscan1': { name: '24/7 Weatherscan', src: 'https://183.bozztv.com/giatv/giatv-gioscan/gioscan/playlist.m3u8' },
    'galaxytv1': { name: 'GALAXY TV', src: 'https://183.bozztv.com/giatv/giatv-GalaxyTV/GalaxyTV/playlist.m3u8' },
    'cubotv1': { name: 'Cubo TV', src: 'https://app.viloud.tv/hls/channel/8bbd37ec03ea0e570a4a6c1c4bb1943b.m3u8' },
    'gustotv1': { name: 'Gusto TV', src: 'https://amg01077-amg01077c7-wisptv-us-3741.playouts.now.amagi.tv/playlist/amg01077-gusto-gustousmain-wisptvus/playlist.m3u8' },
    'throwbacktv1': { name: 'Throwback TV Network', src: 'https://183.bozztv.com/giatv/giatv-throwbacktv/throwbacktv/playlist.m3u8' },
    'hardrocktv1': { name: 'Hard Rock TV', src: 'https://rpn.bozztv.com/gusa/gusa-hotrock/tracks-v1a1/index.m3u8' },
    'younghollywood1': { name: 'Young Hollywood', src: 'https://younghollywood-rakuten-samsung.amagi.tv/playlist.m3u8' },
    'gigabytetv1': { name: 'GigabyteTV', src: 'https://183.bozztv.com/giatv/giatv-giotvaccess/giotvaccess/playlist.m3u8' },
    'gionetwork1': { name: 'Gio Network', src: 'https://183.bozztv.com/giatv/giatv-gionetwork/gionetwork/playlist.m3u8' }
  };

  // Get the stream URL from query parameter
  const urlParams = new URLSearchParams(window.location.search);
  let SRC = "https://183.bozztv.com/giatv/giatv-gionetwork/gionetwork/playlist.m3u8";
  
  // Check if channel parameter is provided
  const channelId = urlParams.get('channel');
  if (channelId && CHANNEL_MAP[channelId]) {
    SRC = CHANNEL_MAP[channelId].src;
  } else {
    // Fallback: check for legacy 'src' parameter
    const legacySrc = urlParams.get('src');
    if (legacySrc) {
      SRC = legacySrc;
    }
  }

  const video         = document.getElementById("video");
  const videoWrap     = document.getElementById("videoWrap");
  const overlay       = document.getElementById("overlay");
  const playBtn       = document.getElementById("playBtn");
  const playIcon      = document.getElementById("playIcon");
  const muteBtn       = document.getElementById("muteBtn");
  const volIcon       = document.getElementById("volIcon");
  const fsBtn         = document.getElementById("fsBtn");
  const pipBtn        = document.getElementById("pipBtn");
  const airplayBtn    = document.getElementById("airplayBtn");
  const castBtn       = document.getElementById("castBtn");
  const spinner       = document.getElementById("spinner");
  const offlineScreen = document.getElementById("offlineScreen");
  const centerFlash   = document.getElementById("centerFlash");
  const flashIcon     = document.getElementById("flashIcon");
  const player        = document.getElementById("player");
  const controlsWrap  = document.getElementById("controlsWrap");
  const scheduleCloseBtn = document.getElementById("scheduleCloseBtn");

  const PLAY_PATH  = "M8 5v14l11-7z";
  const PAUSE_PATH = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";
  const VOL_ON  = "M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z";
  const VOL_OFF = "M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z";

  const OFFLINE_DETAILS = ["manifestLoadError","manifestParsingError","manifestLoadTimeOut","levelLoadError","levelLoadTimeOut"];

  let hls = null, flashTimer = null, hideTimer = null;

  // ── AUTOHIDE ──
  function showControls() {
    controlsWrap.classList.remove("hidden");
    overlay.style.opacity = "1";
    clearTimeout(hideTimer);
    hideTimer = setTimeout(tryHide, 3000);
  }
  function tryHide() {
    if (!video.paused) {
      controlsWrap.classList.add("hidden");
      overlay.style.opacity = "0";
    }
  }
  player.addEventListener("mousemove", showControls);
  player.addEventListener("touchstart", showControls, { passive: true });
  controlsWrap.addEventListener("mouseenter", () => clearTimeout(hideTimer));
  controlsWrap.addEventListener("mouseleave", () => { hideTimer = setTimeout(tryHide, 1500); });
  video.addEventListener("pause", () => { showControls(); clearTimeout(hideTimer); });
  video.addEventListener("play",  () => { showControls(); hideTimer = setTimeout(tryHide, 3000); });

  // ── OFFLINE ──
  function setOffline(v) { offlineScreen.classList.toggle("show", v); }

  function initHls() {
    if (!Hls.isSupported()) {
      video.src = SRC;
      video.addEventListener("loadedmetadata", () => { showSpinner(false); video.play().catch(() => {}); }, { once: true });
      video.addEventListener("error", () => { showSpinner(false); setOffline(true); }, { once: true });
    } else {
      hls = new Hls({ autoStartLoad: true, startLevel: -1, capLevelOnFPSDrop: true });
      hls.loadSource(SRC);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { showSpinner(false); video.play().catch(() => {}); });
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (OFFLINE_DETAILS.includes(data.details)) setOffline(true);
        showSpinner(false);
      });
      video.addEventListener("loadedmetadata", () => { showSpinner(false); video.play().catch(() => {}); }, { once: true });
      video.addEventListener("error", () => { showSpinner(false); setOffline(true); }, { once: true });
    }
  }

  function showSpinner(v) { spinner.classList.toggle("show", v); }

  // ── PLAY/PAUSE ──
  function setPlayIcon(playing) { playIcon.querySelector("path").setAttribute("d", playing ? PAUSE_PATH : PLAY_PATH); }
  playBtn.addEventListener("click", e => { e.stopPropagation(); togglePlay(); });
  videoWrap.addEventListener("click", togglePlay);
  function togglePlay() { if (video.paused) video.play(); else video.pause(); flashCenter(!video.paused); }
  video.addEventListener("play",    () => { setPlayIcon(true);  videoWrap.classList.remove("paused"); });
  video.addEventListener("pause",   () => { setPlayIcon(false); videoWrap.classList.add("paused"); });
  video.addEventListener("waiting", () => showSpinner(true));
  video.addEventListener("playing", () => showSpinner(false));
  function flashCenter(playing) {
    flashIcon.querySelector("path").setAttribute("d", playing ? PAUSE_PATH : PLAY_PATH);
    centerFlash.classList.add("show");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => centerFlash.classList.remove("show"), 500);
  }

  // ── VOLUME ──
  muteBtn.addEventListener("click", () => {
    video.muted = !video.muted;
    volIcon.querySelector("path").setAttribute("d", video.muted ? VOL_OFF : VOL_ON);
  });

  // ── AIRPLAY (Safari) ──
  if (window.WebKitPlaybackTargetAvailabilityEvent) {
    airplayBtn.style.display = "flex";
    video.addEventListener("webkitplaybacktargetavailabilitychanged", e => {
      airplayBtn.style.display = e.availability === "available" ? "flex" : "none";
    });
    airplayBtn.addEventListener("click", e => {
      e.stopPropagation();
      video.webkitShowPlaybackTargetPicker();
    });
    video.addEventListener("webkitcurrentplaybacktargetiswirelesschanged", () => {
      airplayBtn.classList.toggle("active", video.webkitCurrentPlaybackTargetIsWireless);
    });
  }

  // ── CHROMECAST (Cast SDK) ──
  window["__onGCastApiAvailable"] = function(isAvailable) {
    if (!isAvailable) return;
    cast.framework.CastContext.getInstance().setOptions({
      receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
      autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
    });
    castBtn.classList.add("ready");

    const castContext = cast.framework.CastContext.getInstance();
    castBtn.addEventListener("click", e => {
      e.stopPropagation();
      const session = castContext.getCurrentSession();
      if (session) {
        const mediaInfo = new chrome.cast.media.MediaInfo(SRC, "application/x-mpegURL");
        const req = new chrome.cast.media.LoadRequest(mediaInfo);
        session.loadMedia(req).catch(err => console.warn("Cast load:", err));
      } else {
        castContext.requestSession().catch(err => console.warn("Cast session:", err));
      }
    });

    castContext.addEventListener(
      cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
      e => {
        const connected = e.sessionState === cast.framework.SessionState.SESSION_STARTED ||
                          e.sessionState === cast.framework.SessionState.SESSION_RESUMED;
        castBtn.classList.toggle("active", connected);
      }
    );
  };

  // ── PIP ──
  if (!document.pictureInPictureEnabled) pipBtn.style.display = "none";
  pipBtn.addEventListener("click", async e => {
    e.stopPropagation();
    try {
      if (document.pictureInPictureElement) await document.exitPictureInPicture();
      else await video.requestPictureInPicture();
    } catch(err) { console.warn("PiP:", err); }
  });
  video.addEventListener("enterpictureinpicture", () => pipBtn.classList.add("active"));
  video.addEventListener("leavepictureinpicture", () => pipBtn.classList.remove("active"));

  // ── FULLSCREEN ──
  const FS_EXPAND = "M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z";
  const FS_SHRINK = "M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z";
  const fsBtnIcon = document.querySelector("#fsBtn svg path");
  function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement); }
  function enterFullscreen() {
    try {
      if      (player.requestFullscreen)       player.requestFullscreen();
      else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
      else if (player.mozRequestFullScreen)    player.mozRequestFullScreen();
      else if (player.msRequestFullscreen)     player.msRequestFullscreen();
    } catch(e) { console.warn("FS:", e); }
  }
  function exitFullscreen() {
    try {
      if      (document.exitFullscreen)       document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
    } catch(e) { console.warn("FS:", e); }
  }
  fsBtn.addEventListener("click", e => { e.stopPropagation(); isFullscreen() ? exitFullscreen() : enterFullscreen(); });
  player.addEventListener("fullscreenchange", onFsChange);
  player.addEventListener("webkitfullscreenchange", onFsChange);
  player.addEventListener("mozfullscreenchange", onFsChange);
  player.addEventListener("msfullscreenchange", onFsChange);
  function onFsChange() { if (fsBtnIcon) fsBtnIcon.setAttribute("d", isFullscreen() ? FS_SHRINK : FS_EXPAND); }
  document.addEventListener("fullscreenchange", onFsChange);
  document.addEventListener("webkitfullscreenchange", onFsChange);
  document.addEventListener("mozfullscreenchange", onFsChange);

  // ── SCHEDULE ──
  const HOURS = [
    "12:00 AM","1:00 AM","2:00 AM","3:00 AM","4:00 AM","5:00 AM",
    "6:00 AM","7:00 AM","8:00 AM","9:00 AM","10:00 AM","11:00 AM",
    "12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM",
    "6:00 PM","7:00 PM","8:00 PM","9:00 PM","10:00 PM","11:00 PM"
  ];

  // Each slot is one hour; 0 = midnight, 23 = 11 PM
  const SCHEDULE = HOURS.map((time, h) => ({ hour: h, time, title: "No Info", desc: "No Info" }));

  let activeTab = "today";

  function toMins(h) { return h * 60; }

  function buildSchedule(tab) {
    const list = document.getElementById("scheduleList");
    const now = new Date();
    const nowMins = now.getHours() * 60 + now.getMinutes();
    const isToday = tab === "today";

    list.innerHTML = "";
    SCHEDULE.forEach((item) => {
      const start = toMins(item.hour);
      const end   = toMins(item.hour + 1);
      const isCurrent = isToday && nowMins >= start && nowMins < end;

      const li = document.createElement("li");
      li.className = "schedule-item" + (isCurrent ? " now" : "");
      li.innerHTML = `
        <span class="si-time">${item.time}</span>
        <div class="si-info">
          <div class="si-title">${item.title}${isCurrent ? '<span class="now-pill">Now</span>' : ''}</div>
          <div class="si-desc">${item.desc}</div>
        </div>`;
      list.appendChild(li);
    });

    if (isToday) {
      const nowHour = now.getHours();
      setTimeout(() => {
        const items = list.querySelectorAll(".schedule-item");
        if (items[nowHour]) items[nowHour].scrollIntoView({ block: "start", behavior: "smooth" });
      }, 150);
    } else {
      list.scrollTop = 0;
    }
  }

  document.getElementById("tabToday").addEventListener("click", () => {
    activeTab = "today";
    document.getElementById("tabToday").classList.add("active");
    document.getElementById("tabTomorrow").classList.remove("active");
    buildSchedule("today");
  });

  document.getElementById("tabTomorrow").addEventListener("click", () => {
    activeTab = "tomorrow";
    document.getElementById("tabTomorrow").classList.add("active");
    document.getElementById("tabToday").classList.remove("active");
    buildSchedule("tomorrow");
  });

  // ── CLOSE BUTTON ──
  scheduleCloseBtn.addEventListener("click", () => {
    // Go back to the previous page
    window.history.back();
  });

  // ── START ──
  buildSchedule("today");
  showControls();
  initHls();

  // Show controls on load
  showControls();
</script>
