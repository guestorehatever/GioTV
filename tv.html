<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GioTV</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&family=Barlow+Condensed:wght@500;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  :root{
    --void:#050014;
    --panel:#150a35;
    --panel-2:#1e1148;
    --magenta:#ff2f92;
    --cyan:#00f0ff;
    --yellow:#ffcb05;
    --chrome:#e8e8f0;
    --muted:#9a90c2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:#000;
    color:var(--chrome);
    font-family:'Barlow Condensed',sans-serif;
  }
  img{-webkit-user-drag:none;user-drag:none;pointer-events:none;}
  button{font-family:inherit;}

  /* ── CRT bezel: the whole app sits inside a chunky plastic TV frame ── */
  #bezel{
    position:fixed; inset:1.4vh;
    background:linear-gradient(160deg,#2a2a34 0%, #121218 60%, #050508 100%);
    border-radius:2.2vh;
    box-shadow:
      inset 0 0 0 0.3vh rgba(255,255,255,0.05),
      0 1.4vh 4vh rgba(0,0,0,0.7);
    padding:1.6vh;
  }
  #screen{
    position:relative;
    width:100%; height:100%;
    background:var(--void);
    border-radius:1.2vh;
    overflow:hidden;
    box-shadow:inset 0 0 6vh rgba(0,0,0,0.85);
  }

  /* Scanline + vignette texture over everything, purely decorative */
  #crtOverlay{
    position:absolute; inset:0; z-index:80; pointer-events:none;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 2px, transparent 3px),
      radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode:multiply;
  }

  /* ── Header ── */
  #brandRow{
    position:relative; z-index:2;
    display:flex; align-items:center; justify-content:space-between;
    padding:2.6vh 3vw 1.2vh;
  }
  #brand{
    font-family:'Bungee',sans-serif;
    font-size:2.8vh; letter-spacing:0.02em;
    color:var(--yellow);
    text-shadow:0.2vh 0.2vh 0 var(--magenta);
  }
  #clock{
    font-family:'VT323',monospace;
    font-size:3.2vh; letter-spacing:0.05em;
    color:var(--cyan);
    text-shadow:0 0 1vh rgba(0,240,255,0.6);
  }
  #guideDivider{
    position:relative; z-index:2;
    margin:0 3vw 1.6vh;
    border:none; border-top:0.3vh dashed rgba(154,144,194,0.4);
  }

  /* ── Channel grid ── */
  #grid{
    position:relative; z-index:2;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
    gap:1.6vh 1.6vw;
    padding:0 3vw 4vh;
    height:calc(100% - 12vh);
    overflow-y:auto;
  }
  .tile{
    display:flex; flex-direction:column; align-items:stretch;
    background:var(--panel);
    border:0.25vh solid rgba(154,144,194,0.25);
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    color:var(--chrome);
    text-align:left;
    padding:0;
    transition:transform .12s ease, border-color .12s ease;
  }
  .tile:hover{ border-color:var(--cyan); }
  .tile:focus{
    outline:0.35vh solid var(--yellow);
    outline-offset:0.3vh;
    border-color:var(--yellow);
    transform:scale(1.03);
  }
  .tile-media{
    position:relative;
    width:100%; aspect-ratio:16/9;
    background:linear-gradient(160deg,#20123f 0%, var(--panel-2) 100%);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .tile-media img{
    width:100%; height:100%; object-fit:cover; display:block;
    filter:saturate(1.05) contrast(1.05);
  }
  .fallback-label{
    font-family:'Bungee',sans-serif; font-size:1.6vh; text-align:center;
    color:var(--magenta); padding:1vh; text-transform:uppercase;
  }
  .chan-num{
    position:absolute; top:0.6vh; left:0.6vh; z-index:3;
    font-family:'VT323',monospace;
    font-size:2.6vh; line-height:1;
    background:rgba(5,0,20,0.85);
    color:var(--yellow);
    border:0.2vh solid rgba(255,203,5,0.5);
    border-radius:4px;
    padding:0.2vh 0.8vh;
  }
  .tile-live{
    position:absolute; top:0.6vh; right:0.6vh; z-index:3;
    display:none; align-items:center; gap:0.4vh;
    background:rgba(0,0,0,0.6); border:1px solid rgba(255,47,146,0.6);
    border-radius:4px; padding:0.3vh 0.8vh;
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:1.2vh; letter-spacing:0.1em; color:var(--magenta);
  }
  .tile-live.on{display:flex;}
  .tile-live .dotpulse{
    width:0.8vh; height:0.8vh; border-radius:50%; background:var(--magenta);
    box-shadow:0 0 0.6vh var(--magenta);
  }
  .tile-info{ padding:1.2vh 1.2vh 1.4vh; }
  .tile-name{
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    letter-spacing:0.02em; font-size:2vh; line-height:1.15;
  }
  .tile-tag{
    margin-top:0.4vh;
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.3vh; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }

  /* ── Tuning / static transition (the signature moment) ── */
  #tuneOverlay{
    position:absolute; inset:0; z-index:90;
    display:none;
    align-items:center; justify-content:center;
    background:#000;
  }
  #tuneOverlay.on{ display:flex; }
  #tuneCanvas{ position:absolute; inset:0; width:100%; height:100%; }
  #tuneNumber{
    position:relative; z-index:1;
    font-family:'VT323',monospace;
    font-size:18vh; line-height:1;
    color:var(--yellow);
    text-shadow:0 0 2vh rgba(255,203,5,0.7), 0.3vh 0.3vh 0 var(--magenta);
  }

  /* ── Full screen player ── */
  #player{
    position:absolute; inset:0; z-index:60; background:#000;
    display:none;
  }
  #player.active{display:block;}
  #player video{width:100%; height:100%; object-fit:contain; background:#000;}

  #playerStatus{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:1.6vh;
    background:#000; color:var(--muted);
    font-family:'VT323',monospace;
    font-size:2.6vh; letter-spacing:0.05em;
  }
  #playerStatus .spinner{
    width:4vh; height:4vh; border-radius:50%;
    border:0.4vh solid rgba(255,255,255,0.15);
    border-top-color:var(--magenta);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  #playerOverlay{
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:3vh 3vw;
    background:linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 22%, transparent 70%, rgba(0,0,0,0.8) 100%);
  }
  #backBtn{
    display:flex; align-items:center; gap:0.8vh;
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase; font-size:1.8vh;
    color:var(--chrome);
    background:rgba(21,10,53,0.85); border:0.2vh solid rgba(154,144,194,0.35);
    border-radius:6px; padding:1vh 1.6vh;
    cursor:pointer;
  }
  #backBtn:focus{ outline:0.35vh solid var(--yellow); outline-offset:0.3vh; }

  #playerChanName{
    font-family:'Bungee',sans-serif; font-size:2.6vh; letter-spacing:0.01em;
    color:var(--chrome);
  }
  #playerChanNum{
    font-family:'VT323',monospace; font-size:2.4vh; color:var(--yellow);
    margin-top:0.4vh;
  }

  #playerBottom{
    display:flex; align-items:center; gap:2vh;
  }
  .ctrl-btn{
    display:flex; align-items:center; justify-content:center;
    width:6vh; height:6vh; border-radius:50%;
    background:rgba(21,10,53,0.85); border:0.2vh solid rgba(154,144,194,0.35);
    color:var(--chrome); font-size:2.4vh;
    cursor:pointer;
  }
  .ctrl-btn:focus{ outline:0.35vh solid var(--yellow); outline-offset:0.3vh; }
  #volTrack{
    width:16vh; height:0.6vh; border-radius:1vh;
    background:rgba(255,255,255,0.18);
    position:relative;
  }
  #volFill{
    position:absolute; left:0; top:0; bottom:0;
    width:70%; border-radius:1vh; background:var(--magenta);
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>

<div id="bezel">
  <div id="screen">
    <div id="brandRow">
      <div id="brand">GioTV</div>
      <div id="clock">--:--</div>
    </div>
    <hr id="guideDivider">

    <div id="grid"></div>

    <!-- Tuning / static transition -->
    <div id="tuneOverlay">
      <canvas id="tuneCanvas"></canvas>
      <div id="tuneNumber"></div>
    </div>

    <!-- Full screen player -->
    <div id="player">
      <div id="playerStatus"><div class="spinner"></div><span id="playerStatusText">Loading stream…</span></div>
      <video id="video" playsinline></video>
      <div id="playerOverlay">
        <div>
          <button id="backBtn">◀ Back to Guide</button>
        </div>
        <div>
          <div id="playerChanName">—</div>
          <div id="playerChanNum">CH —</div>
          <div id="playerBottom" style="margin-top:1.6vh;">
            <button class="ctrl-btn" id="btnPlayPause">▶</button>
            <button class="ctrl-btn" id="btnMute">🔊</button>
            <div id="volTrack"><div id="volFill"></div></div>
          </div>
        </div>
      </div>
    </div>

    <div id="crtOverlay"></div>
  </div>
</div>

<script>
/* ───────────────────────── Channel data ─────────────────────────
   Mapped onto real analog VHF channel numbers 2–13 — there are
   exactly 12 channels here, the same count as the old VHF band, so
   this isn't arbitrary: it's the actual channel range a 90s set
   would show. Channel 3 (a classic analog EAS/test-pattern slot)
   goes to EAS Details on purpose.
*/
const CHANNELS = [
  { num:2,  slug:'tapetime',       name:'TapeTime Radio',    tag:'Variety',            img:'tapetime.jpg',       src:'https://183.bozztv.com/giatv/giatv-gionetwork/gionetwork/playlist.m3u8' },
  { num:3,  slug:'easdetails',     name:'EAS Details',        tag:'Emergency Alert System', img:null,             src:'https://183.bozztv.com/giatv/giatv-easde/easde/playlist.m3u8' },
  { num:4,  slug:'fighttv',        name:'Fight TV',           tag:'Boxing / Fighting',  img:'fight_tv.jpeg',      src:'https://rpn.bozztv.com/gusa/gusa-fighttvplus/index.m3u8' },
  { num:5,  slug:'galaxytv',       name:'GALAXY TV',          tag:'Entertainment',      img:'galaxy_tv.png',      src:'https://183.bozztv.com/giatv/giatv-GalaxyTV/GalaxyTV/playlist.m3u8' },
  { num:6,  slug:'cubotv',         name:'Cubo TV',            tag:'Anime',              img:'cubo_tv.png',        src:'https://app.viloud.tv/hls/channel/8bbd37ec03ea0e570a4a6c1c4bb1943b.m3u8' },
  { num:7,  slug:'gustotv',        name:'Gusto TV',           tag:'Cooking',            img:'gusto_tv.png',       src:'https://amg01077-amg01077c7-wisptv-us-3741.playouts.now.amagi.tv/playlist/amg01077-gusto-gustousmain-wisptvus/playlist.m3u8' },
  { num:8,  slug:'throwbacktv',    name:'Throwback TV Network', tag:'Comedy',           img:'throwback_tv.jpeg',  src:'https://183.bozztv.com/giatv/giatv-throwbacktv/throwbacktv/playlist.m3u8' },
  { num:9,  slug:'hardrocktv',     name:'Hard Rock TV',       tag:'Music',              img:'IMG_5344.jpeg',      src:'https://rpn.bozztv.com/gusa/gusa-hotrock/tracks-v1a1/index.m3u8' },
  { num:10, slug:'younghollywood', name:'Young Hollywood',    tag:'Lifestyle',          img:'young_hollywood.jpg',src:'https://younghollywood-rakuten-samsung.amagi.tv/playlist.m3u8' },
  { num:11, slug:'gigabytetv',     name:'GigabyteTV',         tag:'Variety',            img:'gigabyte_tv.png',    src:'https://183.bozztv.com/giatv/giatv-giotvaccess/giotvaccess/playlist.m3u8' },
  { num:12, slug:'highlandweather',name:'Highland Weather',   tag:'Weather · TN / SC / NC', img:'https://api.mistweather.com/api/v1.5/image/ad783999-61dc-4382-a9de-1abcfe81e0e2?width=600&height=169&fit=inside', src:'https://watch.mistweather.com/hls/highland-networks-ch1/2_1/index.m3u8' },
  { num:13, slug:'kpoptvplay',     name:'TV Play K-Pop',      tag:'Music',              img:'kpop.png',           src:'https://183.bozztv.com/giatv/giatv-kpoptvplay/kpoptvplay/chunks.m3u8' }
];

/* ───────────────────────── State ───────────────────────── */
let hls = null;
let liveState = {};
let retryTimer = null;
let lastOpenedSlug = null;
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const grid = document.getElementById('grid');
const player = document.getElementById('player');
const video = document.getElementById('video');
const playerStatus = document.getElementById('playerStatus');
const playerStatusText = document.getElementById('playerStatusText');
const playerChanName = document.getElementById('playerChanName');
const playerChanNum = document.getElementById('playerChanNum');
const btnPlayPause = document.getElementById('btnPlayPause');
const btnMute = document.getElementById('btnMute');
const volFill = document.getElementById('volFill');
const backBtn = document.getElementById('backBtn');
const tuneOverlay = document.getElementById('tuneOverlay');
const tuneCanvas = document.getElementById('tuneCanvas');
const tuneNumber = document.getElementById('tuneNumber');

/* ───────────────────────── Build grid ─────────────────────────
   Every tile is a real <button> — natively focusable, natively
   fires a click on Enter/OK, and the WebView draws its own focus
   ring (recolored via CSS outline, still the real native ring —
   no manually-tracked focus state to keep in sync or break).
*/
CHANNELS.forEach((ch) => {
  const tile = document.createElement('button');
  tile.className = 'tile';
  tile.type = 'button';

  let mediaHTML;
  if (ch.img) {
    mediaHTML = `<img src="${ch.img}" alt="${ch.name}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fallback-label',textContent:'${ch.name}'}))">`;
  } else {
    mediaHTML = `<div class="fallback-label">${ch.name}</div>`;
  }

  tile.innerHTML = `
    <div class="tile-media">
      ${mediaHTML}
      <div class="chan-num">${ch.num}</div>
      <div class="tile-live" id="live-${ch.slug}"><span class="dotpulse"></span>LIVE</div>
    </div>
    <div class="tile-info">
      <div class="tile-name">${ch.name}</div>
      <div class="tile-tag">${ch.tag}</div>
    </div>
  `;
  tile.addEventListener('click', () => tuneToChannel(ch));
  grid.appendChild(tile);
});

/* ───────────────────────── Live status polling ───────────────────────── */
/* ───────────────────────── Tuning / static transition ─────────────────────────
   The signature moment: a brief burst of static with the channel
   number punched up in big CRT-style digits, like turning an old
   channel dial, before the stream itself takes over. Skipped
   entirely under prefers-reduced-motion.
*/
function drawStaticFrame(ctx, w, h){
  const imgData = ctx.createImageData(w, h);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const v = Math.random() * 255;
    imgData.data[i] = v; imgData.data[i+1] = v; imgData.data[i+2] = v; imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function tuneToChannel(ch){
  if (reduceMotion) { openChannel(ch); return; }

  tuneOverlay.classList.add('on');
  tuneNumber.textContent = 'CH ' + ch.num;
  const ctx = tuneCanvas.getContext('2d');
  // low-res canvas scaled up via CSS for a chunkier, more authentic static look
  tuneCanvas.width = 160; tuneCanvas.height = 90;

  let frames = 0;
  const staticTimer = setInterval(() => {
    drawStaticFrame(ctx, tuneCanvas.width, tuneCanvas.height);
    frames++;
    if (frames >= 8) {
      clearInterval(staticTimer);
      tuneOverlay.classList.remove('on');
      openChannel(ch);
    }
  }, 55);
}

/* ───────────────────────── Player / HLS playback ───────────────────────── */
  playerChanNum.textContent = 'CH ' + ch.num;
  player.classList.add('active');
  showStatus('Loading stream…');
  attemptPlayback(ch.src);
  try { backBtn.focus({ preventScroll:true }); } catch(e) {}
  try {
    history.pushState({ giotv:'player', slug: ch.slug }, '', '#' + ch.slug);
  } catch (e) {
    try { location.hash = ch.slug; } catch(e2) {}
  }
}

function closePlayer(skipHash){
  player.classList.remove('active');
  video.pause();
  video.removeAttribute('src');
  video.load();
  if (hls) { hls.destroy(); hls = null; }
  clearInterval(retryTimer);
  if (!skipHash) {
    try {
      history.pushState({ giotv:'select' }, '', location.pathname + location.search);
    } catch (e) {
      try { location.hash = ''; } catch(e2) {}
    }
  }
  if (lastOpenedSlug) {
    const idx = CHANNELS.findIndex(c => c.slug === lastOpenedSlug);
    const tileEl = grid.children[idx];
    if (tileEl) { try { tileEl.focus({ preventScroll:true }); } catch(e) {} }
  }
}

function togglePlayPause(){
  if (video.paused) { video.play().catch(()=>{}); btnPlayPause.textContent = '❚❚'; }
  else { video.pause(); btnPlayPause.textContent = '▶'; }
}
function toggleMute(){
  video.muted = !video.muted;
  btnMute.textContent = video.muted ? '🔇' : '🔊';
  volFill.style.width = video.muted ? '0%' : '70%';
}
backBtn.addEventListener('click', () => closePlayer());
btnPlayPause.addEventListener('click', togglePlayPause);
btnMute.addEventListener('click', toggleMute);
video.addEventListener('play', () => btnPlayPause.textContent = '❚❚');
video.addEventListener('pause', () => btnPlayPause.textContent = '▶');

/* ───────────────────────── Minimal keyboard extras ───────────────────────── */
document.addEventListener('keydown', (e) => {
  if (!player.classList.contains('active')) return;
  switch (e.key) {
    case 'Backspace': case 'Escape': case 'GoBack': case 'BrowserBack':
      e.preventDefault(); closePlayer(); break;
    case 'ArrowUp':
      if (!video.muted) { video.volume = Math.min(1, video.volume + 0.1); volFill.style.width = (video.volume*100)+'%'; }
      break;
    case 'ArrowDown':
      if (!video.muted) { video.volume = Math.max(0, video.volume - 0.1); volFill.style.width = (video.volume*100)+'%'; }
      break;
  }
});

/* ───────────────────────── Deep-linking: website.com/tv#channelname ───────────────────────── */
function slugFromHash(){
  return decodeURIComponent(location.hash.replace(/^#/, ''));
}

function initFromHash(){
  const slug = slugFromHash();
  if (!slug) return;
  const ch = CHANNELS.find(c => c.slug === slug);
  if (ch) openChannel(ch); // deep-links skip the tuning static, they're already "tuned in"
}

window.addEventListener('popstate', () => {
  const slug = slugFromHash();
  if (!slug) {
    if (player.classList.contains('active')) closePlayer(true);
    return;
  }
  const ch = CHANNELS.find(c => c.slug === slug);
  if (ch && (!player.classList.contains('active') || lastOpenedSlug !== slug)) {
    openChannel(ch);
  }
});

/* ───────────────────────── Init ───────────────────────── */
initFromHash();
</script>
</body>
</html>
