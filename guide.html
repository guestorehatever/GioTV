<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GioTV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  :root{
    --red:#e8192c;
    --dark-red:#a50e1c;
    --black:#07080c;
    --panel:#12141b;
    --border:rgba(255,255,255,0.09);
    --text:#f0f2f7;
    --muted:#8a92a6;
    --gold:#f5c842;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:var(--black);
    color:var(--text);
    font-family:'Barlow',sans-serif;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  img{-webkit-user-drag:none;user-drag:none;pointer-events:none;}

  /* ── App shell, locked to 16:9 ── */
  #app{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #stage{
    position:relative;
    width:100vw; height:56.25vw; /* 16:9 based on width */
    max-height:100vh; max-width:177.78vh; /* 16:9 based on height */
    background:var(--black);
    overflow:hidden;
  }

  /* ── Ambient hero backdrop ── */
  #heroBg{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    filter:blur(38px) brightness(0.38) saturate(1.1);
    transform:scale(1.15);
    transition:background-image .5s ease;
  }
  #heroScrim{
    position:absolute; inset:0;
    background:
      linear-gradient(to top, rgba(7,8,12,0.98) 0%, rgba(7,8,12,0.75) 34%, rgba(7,8,12,0.15) 62%, rgba(7,8,12,0.55) 100%),
      linear-gradient(90deg, rgba(7,8,12,0.55) 0%, transparent 45%);
  }

  /* ── Header / brand + live badge ── */
  #brandRow{
    position:absolute; top:2.6vw; left:3vw; right:3vw;
    display:flex; align-items:center; justify-content:space-between;
    z-index:5;
  }
  #brand{
    font-family:'Bebas Neue',sans-serif;
    font-size:2vw; letter-spacing:0.08em;
    color:var(--muted);
  }
  #brand span{color:var(--red);}
  #clock{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700; letter-spacing:0.1em;
    font-size:1.1vw; color:var(--muted);
  }

  /* ── Focused channel info ── */
  #infoBlock{
    position:absolute; left:3vw; top:16vw;
    z-index:5; max-width:52vw;
  }
  #chanEyebrow{
    font-family:'Barlow Condensed',sans-serif;
    font-size:0.95vw; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--red); font-weight:700; margin-bottom:0.6vw;
    display:flex; align-items:center; gap:0.6vw;
  }
  .live-dot{
    width:0.6vw; height:0.6vw; border-radius:50%;
    background:var(--red); box-shadow:0 0 0.8vw var(--red);
    display:none;
  }
  .live-dot.on{display:inline-block;}
  #chanTitle{
    font-family:'Bebas Neue',sans-serif;
    font-size:4.6vw; line-height:0.95;
    letter-spacing:0.01em;
    text-shadow:0 4px 24px rgba(0,0,0,0.5);
  }
  #chanTag{
    margin-top:0.9vw;
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.05vw; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }

  /* ── Remote hint ── */
  #hint{
    position:absolute; right:3vw; top:16.4vw; z-index:5;
    display:flex; gap:1.4vw;
    font-family:'Barlow Condensed',sans-serif;
    font-size:0.85vw; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--muted); font-weight:700;
  }
  #hint span{display:flex; align-items:center; gap:0.5vw;}
  .key{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:1.8vw; height:1.8vw; padding:0 0.4vw;
    border:1px solid var(--border); border-radius:0.3vw;
    color:var(--text); font-size:0.85vw;
  }

  /* ── Carousel row ── */
  #carouselWrap{
    position:absolute; left:0; right:0; bottom:3.4vw;
    z-index:5; overflow:hidden; padding:0 3vw;
  }
  #carousel{
    display:flex; align-items:flex-end; gap:1.4vw;
    transition:transform .38s cubic-bezier(.2,.8,.2,1);
    will-change:transform;
  }
  .tile{
    position:relative;
    flex:0 0 auto;
    width:17vw;
    aspect-ratio:16/9;
    border-radius:0.5vw;
    overflow:hidden;
    background:var(--panel);
    border:0.16vw solid transparent;
    transform:scale(0.86);
    transition:transform .28s cubic-bezier(.2,.8,.2,1), border-color .28s, box-shadow .28s, opacity .28s;
    opacity:0.62;
  }
  .tile img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .tile .tile-fallback{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:1vw;
    background:linear-gradient(160deg,#1a0d0f 0%, var(--panel) 100%);
  }
  .tile .tile-fallback span{
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    text-transform:uppercase; letter-spacing:0.05em;
    font-size:1vw; color:var(--red); line-height:1.25;
  }
  .tile-live{
    position:absolute; top:0.6vw; left:0.6vw;
    display:none; align-items:center; gap:0.35vw;
    background:rgba(0,0,0,0.55); border:1px solid rgba(232,25,44,0.5);
    border-radius:0.25vw; padding:0.18vw 0.55vw;
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:0.68vw; letter-spacing:0.12em; color:var(--red);
  }
  .tile-live.on{display:flex;}
  .tile-live .dotpulse{
    width:0.4vw; height:0.4vw; border-radius:50%; background:var(--red);
    box-shadow:0 0 0.5vw var(--red);
  }
  .tile-scrim{
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 55%);
    opacity:0; transition:opacity .28s;
  }
  .tile-name{
    position:absolute; left:0.7vw; right:0.7vw; bottom:0.55vw;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700; letter-spacing:0.03em; text-transform:uppercase;
    font-size:0.85vw; color:var(--text);
    opacity:0; transform:translateY(4px);
    transition:opacity .28s, transform .28s;
    text-shadow:0 2px 10px rgba(0,0,0,0.8);
  }

  .tile.focused{
    transform:scale(1);
    opacity:1;
    border-color:var(--red);
    box-shadow:0 0 0 0.14vw rgba(232,25,44,0.35), 0 1.4vw 3vw rgba(232,25,44,0.35);
  }
  .tile.focused .tile-scrim{opacity:1;}
  .tile.focused .tile-name{opacity:1; transform:translateY(0);}

  /* ── Player ── */
  #player{
    position:absolute; inset:0; background:#000;
    z-index:50; display:none;
  }
  #player.active{display:block;}
  #player video{width:100%; height:100%; object-fit:contain; background:#000;}

  #playerStatus{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:1vw;
    background:#000; color:var(--muted);
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.1vw; letter-spacing:0.08em; text-transform:uppercase;
  }
  #playerStatus .spinner{
    width:2.6vw; height:2.6vw; border-radius:50%;
    border:0.25vw solid rgba(255,255,255,0.15);
    border-top-color:var(--red);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  #playerOverlay{
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:2.4vw 3vw;
    background:linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 22%, transparent 70%, rgba(0,0,0,0.75) 100%);
    opacity:0; pointer-events:none;
    transition:opacity .3s;
  }
  #playerOverlay.show{opacity:1; pointer-events:auto;}

  #playerTop{display:flex; align-items:center; gap:1vw; pointer-events:auto;}
  #backChip{
    display:flex; align-items:center; gap:0.6vw;
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase; font-size:0.95vw;
    color:var(--text);
    cursor:pointer;
  }
  #backChip.dpad-focus{
    border:0.14vw solid var(--red);
    border-radius:0.35vw;
    padding:0.4vw 0.8vw;
    background:rgba(232,25,44,0.18);

  { slug:'kpoptvplay',     name:'TV Play K-Pop',      tag:'Music',              img:'kpop.png',           src:'https://183.bozztv.com/giatv/giatv-kpoptvplay/kpoptvplay/chunks.m3u8' }
];

/* ───────────────────────── State ───────────────────────── */
let focusIndex = 0;
let lastFocusIndex = 0;
let hls = null;
let liveState = {}; // slug -> bool
let playerFocusIdx = 0; // index into playerControls (defined further below, after backChip exists)
let overlayTimer = null;
let retryTimer = null;

const carousel = document.getElementById('carousel');
const chanTitleEl = document.getElementById('chanTitle');
const chanTagEl = document.getElementById('chanTag');
const eyebrowText = document.getElementById('eyebrowText');
const liveDot = document.getElementById('liveDot');
const heroBg = document.getElementById('heroBg');
const selectScreen = document.getElementById('selectScreen');
const player = document.getElementById('player');
const video = document.getElementById('video');
const playerStatus = document.getElementById('playerStatus');
const playerStatusText = document.getElementById('playerStatusText');
const playerOverlay = document.getElementById('playerOverlay');
const playerChanName = document.getElementById('playerChanName');
const btnPlayPause = document.getElementById('btnPlayPause');
const btnMute = document.getElementById('btnMute');
const volFill = document.getElementById('volFill');
const backChip = document.getElementById('backChip');

// Ordered focus targets for D-pad/keyboard selection inside the player.
// backChip is included so ArrowLeft/ArrowRight selection can actually
// reach the back button — previously only play/pause and mute were
// reachable this way, so back could only be triggered by the dedicated
// Backspace/Escape keys, never by highlighting it and pressing OK.
const playerControls = [btnPlayPause, btnMute, backChip];
  document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;
}
tickClock(); setInterval(tickClock, 15000);

/* ───────────────────────── Player / HLS playback (fixed)
   Old version created a brand-new Hls() instance every 8s on ANY error, forever
   stacking instances on top of the still-attached old one. This version:
    try {
      history.pushState({ giotv:'player', slug: ch.slug }, '', '#' + ch.slug);
    } catch (e) {
      // Some WebView/sandbox contexts restrict history rewrites; deep-link
      // sharing via hash just won't update in that case, but playback and
      // in-page back navigation keep working since they don't depend on it.
      location.hash = ch.slug;
    }
  }
}

function closePlayer(skipHash){
  player.classList.remove('active');
  video.pause();
  video.removeAttribute('src');
  video.load();
  if (hls) { hls.destroy(); hls = null; }
  clearInterval(retryTimer);
  clearTimeout(overlayTimer);
  // restore focus to previously selected channel
  focusIndex = lastFocusIndex;
  updateFocus();
  if (!skipHash) {
    try {
      history.pushState({ giotv:'select' }, '', location.pathname + location.search);
    } catch (e) {
      location.hash = '';
    }
  }
}

function showOverlay(temporary){
  playerOverlay.classList.add('show');
  clearTimeout(overlayTimer);
  if (temporary) overlayTimer = setTimeout(() => playerOverlay.classList.remove('show'), 3500);
}

function togglePlayPause(){
  if (video.paused) { video.play().catch(()=>{}); btnPlayPause.textContent = '❚❚'; }
  else { video.pause(); btnPlayPause.textContent = '▶'; }
}
function toggleMute(){
  video.muted = !video.muted;
  btnMute.textContent = video.muted ? '🔇' : '🔊';
  volFill.style.width = video.muted ? '0%' : '70%';
}
btnPlayPause.addEventListener('click', togglePlayPause);
btnMute.addEventListener('click', toggleMute);
backChip.addEventListener('click', () => closePlayer());
video.addEventListener('play', () => btnPlayPause.textContent = '❚❚');
video.addEventListener('pause', () => btnPlayPause.textContent = '▶');

function updatePlayerCtrlFocus(){
  playerControls.forEach((b,i) => b.classList.toggle('dpad-focus', i === playerFocusIdx));
}

/* ───────────────────────── Remote / D-pad input ───────────────────────── */
document.addEventListener('keydown', (e) => {
  const inPlayer = player.classList.contains('active');

  if (!inPlayer) {
    switch (e.key) {
      case 'ArrowLeft': e.preventDefault(); moveFocus(-1); break;
      case 'ArrowRight': e.preventDefault(); moveFocus(1); break;
      case 'Enter': case ' ': case 'OK':
        e.preventDefault(); openChannel(focusIndex); break;
    }
  } else {
    switch (e.key) {
      case 'Backspace': case 'Escape': case 'GoBack': case 'BrowserBack':
        e.preventDefault(); closePlayer(); break;
      case 'ArrowLeft': case 'ArrowRight':
        e.preventDefault();
        playerFocusIdx = e.key === 'ArrowRight'
          ? (playerFocusIdx + 1) % playerControls.length
          : (playerFocusIdx - 1 + playerControls.length) % playerControls.length;
        updatePlayerCtrlFocus(); showOverlay(true);
        break;
      case 'ArrowUp':
        e.preventDefault();
        if (!video.muted) { video.volume = Math.min(1, video.volume + 0.1); volFill.style.width = (video.volume*100)+'%'; }
        showOverlay(true);
        break;
      case 'ArrowDown':
        e.preventDefault();
        if (!video.muted) { video.volume = Math.max(0, video.volume - 0.1); volFill.style.width = (video.volume*100)+'%'; }
        showOverlay(true);
        break;
      case 'Enter': case ' ': case 'OK':
        e.preventDefault();
        if (playerControls[playerFocusIdx] === btnPlayPause) togglePlayPause();
        else if (playerControls[playerFocusIdx] === btnMute) toggleMute();
        else closePlayer(); // backChip selected
        showOverlay(true);
        break;
      default:
        showOverlay(true);
    }
  }
});

/* ───────────────────────── Deep-linking: website.com/tv#channelname ─────────────────────────
   - Loading the page with a hash jumps straight into that channel.
   - Opening a channel pushes its slug into the hash so it's shareable.
   - Browser/remote back closes the player and clears the hash instead of
     leaving the page (same "trap" pattern as guide.html).
*/
function slugFromHash(){
  return decodeURIComponent(location.hash.replace(/^#/, ''));
}

function initFromHash(){
  const slug = slugFromHash();
  if (!slug) {
    try {
      history.replaceState({ giotv:'select' }, '', location.pathname + location.search);
    } catch (e) { /* restrictive context — safe to ignore, nothing depends on this succeeding */ }
    return;
  }
  const idx = CHANNELS.findIndex(c => c.slug === slug);
  if (idx >= 0) {
    focusIndex = idx;
    updateFocus();
    try {
      history.replaceState({ giotv:'player', slug }, '', '#' + slug);
    } catch (e) { /* restrictive context — safe to ignore */ }
    openChannel(idx, true);
  } else {
    try {
      history.replaceState({ giotv:'select' }, '', location.pathname + location.search);
    } catch (e) { /* restrictive context — safe to ignore */ }
  }
}

window.addEventListener('popstate', (e) => {
  const slug = slugFromHash();
  if (!slug) {
    if (player.classList.contains('active')) {
      closePlayer(true); // hash already cleared by the back nav itself
    }
    return;
  }
  const idx = CHANNELS.findIndex(c => c.slug === slug);
  if (idx >= 0) {
    focusIndex = idx;
    updateFocus();
    if (!player.classList.contains('active')) {
      openChannel(idx, true);
    } else if (CHANNELS[lastFocusIndex].slug !== slug) {
      openChannel(idx, true);
    }
  }
});

/* Click on video re-shows overlay (touch remotes / mouse fallback) */
player.addEventListener('mousemove', () => showOverlay(true));
player.addEventListener('click', () => showOverlay(true));

/* Keep overlay visible while the cursor is actually over it (back button,
   play/pause, mute, volume) — otherwise the 3.5s auto-hide timer can fade
   the overlay out from under the cursor mid-approach, making buttons look
   unreachable even though they're still technically clickable underneath. */
playerOverlay.addEventListener('mouseenter', () => {
  clearTimeout(overlayTimer);
});
playerOverlay.addEventListener('mouseleave', () => {
  showOverlay(true); // resumes the normal 3.5s countdown once cursor leaves
});

/* ───────────────────────── Init ───────────────────────── */
updateFocus();
updatePlayerCtrlFocus();
initFromHash();
</script>
